        const setbackData = [

        const parkingData = [
        { use: 'Residential (Multi-dwelling)', rule: '1 car per tenement exceeding 75 to 175 sqm floor area. 2 cars for >175 sqm.', factor: 125 },
        { use: 'Hotels / Lodging', rule: '1 car per 4 rooms or 50 sqm of floor area, whichever is more.', factor: 50 },

        { use: 'Hospital', rule: '1 car per 100 sqm floor area.', factor: 100 },
        { use: 'Nursing Homes', rule: '1 car per 75 sqm floor area.', factor: 75 },
        { use: 'Assembly / Auditorium', rule: '1 car per 15 seats OR 50 sqm of floor area.', factor: 50 },
        { use: 'Commercial / Office / IT', rule: '1 car per 50 sqm of floor area.', factor: 50 },
        { use: 'Industrial / Storage', rule: '1 car per 100 sqm + 1 lorry parking.', factor: 100 },
        { use: 'Kalyana Mantapa / Community Hall', rule: '1 car per 50 sqm floor area.', factor: 50 }
        ];

        const occupancyData = [
        { use: 'Residential / Dwellings', factor: 12.5, wcRatio: 0, wcRule: '1 per dwelling unit' },
        { use: 'Offices / IT Parks / Commercial', factor: 10, wcRatio: 25, wcRule: '1 WC per 25 persons (up to 100), 1 per 50 thereafter' },
        { use: 'Retail / Shopping', factor: 3, wcRatio: 50, wcRule: '1 WC per 50 persons' },
        { use: 'Assembly / Theatres', factor: 0.6, wcRatio: 75, wcRule: 'Average 1 WC per 75 persons (1:100 males, 1:50 females)' },
        { use: 'Educational / Schools', factor: 4, wcRatio: 40, wcRule: '1 WC per 40 students' },
        { use: 'Hospitals / Clinics', factor: 15, wcRatio: 100, wcRule: '1 WC per 4 beds (wards), 1 per 100 persons (OPD)' },
        ];

        const circulationData = [
        { type: 'Residential (inside dwelling unit)', corridor: 'Nil', stairs: '1.0m', ramp: 'Nil' },
        { type: 'Residential (common multi-dwelling)', corridor: '1.5m', stairs: '1.25m', ramp: 'Nil' },
        { type: 'Assembly (Auditorium, Temple, Mosque)', corridor: '2.0m', stairs: '2.0m', ramp: '2.0m' },
        { type: 'Govt. Office', corridor: '2.0m', stairs: '2.0m', ramp: '2.0m' },
        { type: 'Govt. Hospital', corridor: '2.4m', stairs: '2.0m', ramp: '2.0m' },
        { type: 'Educational (Schools, Colleges)', corridor: '2.0m', stairs: '2.0m', ramp: '2.0m' },
        { type: 'Commercial (Shops, Clinics, Lodges)', corridor: '1.5m', stairs: '1.5m', ramp: '1.5m' },
        { type: 'All other buildings', corridor: '1.5m', stairs: '1.5m', ramp: '1.5m' },
        ];

        const equivalenceTableData = [
        { area: 'Up to 1000', roadMin: '<6m', roadReq: '6m', farPerm: 1.30, farPrem: 0.2, farTdr: 0.1, farTotal: 1.60, useRes: 'R', useCom: 'C1', useInd: 'I-1', usePsp: 'P&SP1', useTc: 'T1' },
        { area: '1000-2000', roadMin: '6m', roadReq: '6m', farPerm: 1.40, farPrem: 0.4, farTdr: 0.2, farTotal: 2.00, useRes: 'R', useCom: 'C1', useInd: 'I-1', usePsp: 'P&SP1', useTc: 'T1' },
        { area: '2000-3000', roadMin: '6m', roadReq: '9m', farPerm: 1.50, farPrem: 0.6, farTdr: 0.3, farTotal: 2.40, useRes: 'R', useCom: 'C2', useInd: 'I-1', usePsp: 'P&SP1', useTc: 'T1' },
        { area: '3000-4000', roadMin: '9m', roadReq: '9m', farPerm: 1.60, farPrem: 0.8, farTdr: 0.4, farTotal: 2.80, useRes: 'R', useCom: 'C2', useInd: 'I-2', usePsp: 'P&SP2', useTc: 'T1' },
        { area: 'Over 4000', roadMin: '9m', roadReq: '12m', farPerm: 1.90, farPrem: 1.0, farTdr: 0.5, farTotal: 3.40, useRes: 'R', useCom: 'C3', useInd: 'I-2', usePsp: 'P&SP2', useTc: 'T2' },
        { area: 'Over 4000', roadMin: '12m', roadReq: '12m', farPerm: 2.10, farPrem: 1.0, farTdr: 0.5, farTotal: 3.60, useRes: 'R', useCom: 'C4', useInd: 'I-3', usePsp: 'P&SP3', useTc: 'T2' },
        { area: 'Over 4000', roadMin: '12m', roadReq: '18m', farPerm: 2.30, farPrem: 1.0, farTdr: 0.5, farTotal: 3.80, useRes: 'R', useCom: 'C5', useInd: 'I-3', usePsp: 'P&SP4', useTc: 'T3' },
        { area: 'Over 4000', roadMin: '12m', roadReq: '24m+', farPerm: 2.50, farPrem: 1.0, farTdr: 0.5, farTotal: 4.00, useRes: 'R', useCom: 'C5', useInd: 'I-5', usePsp: 'P&SP4', useTc: 'T4' },
        ];

        const parkingLayoutData = [
          { angle: 'Parallel (0°)', baySize: '2.5m x 6.0m', aisleOneWay: '3.0m', aisleTwoWay: '6.0m' },
          { angle: '30° Angled', baySize: '2.5m x 5.0m', aisleOneWay: '3.0m', aisleTwoWay: '6.0m' },
          { angle: '45° Angled', baySize: '2.5m x 5.0m', aisleOneWay: '3.5m', aisleTwoWay: '6.0m' },
          { angle: '60° Angled', baySize: '2.5m x 5.0m', aisleOneWay: '4.5m', aisleTwoWay: '6.0m' },
          { angle: '90° Perpendicular', baySize: '2.5m x 5.0m', aisleOneWay: '6.0m', aisleTwoWay: '6.0m' }
        ];

        const turningRadiusData = [
          { vehicle: 'Standard Car (LMV)', radius: '4.5m', description: 'Minimum inner turning radius for standard passenger vehicles.' },
          { vehicle: 'Bus / Heavy Vehicle', radius: '9.0m', description: 'Required for commercial transport and large buses.' },
          { vehicle: 'Fire Tender', radius: '9.0m - 12.0m', description: '9m inner and 12m outer turning radius mandatory for high-rise fire access.' }
        ];

        // --- COMPONENTS ---

        const TabButton = ({ active, icon, label, onClick }) => (
        <button
            onClick={onClick}
            className={`flex items-center space-x-2 px-4 py-3 text-sm font-medium rounded-t-lg transition-colors duration-200 border-b-2 ${
            active 
                ? 'border-indigo-600 text-indigo-600 bg-indigo-50' 
                : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'
            }`}
        >
            {icon}
            <span>{label}</span>
        </button>
        );

        const CategoryCard = ({ data }) => {
        return (
            <div className={`border rounded-xl p-6 ${data.color} bg-opacity-10 transition-shadow hover:shadow-md h-full flex flex-col`}>
            <div className="flex items-center space-x-3 mb-4">
                <div className={`p-3 rounded-lg bg-white bg-opacity-60 shadow-sm flex items-center justify-center`}>

                </div>
                <h3 className="text-xl font-bold">{data.title}</h3>
            </div>

            <div className="space-y-4">
                {data.subcategories.map((sub, idx) => (
                <div key={idx} className="bg-white bg-opacity-60 rounded-lg p-4 shadow-sm border border-white border-opacity-40">

                    {sub.items.map((item, i) => (
                        <li key={i} className="flex items-start space-x-2 text-sm">

                        <span>{item}</span>
                        </li>
                    ))}
                    </ul>
                </div>
                ))}
            </div>
            </div>
        );
        };

        const CalculatorSection = () => {
        const [plotArea, setPlotArea] = useState(2500);
        const [roadWidth, setRoadWidth] = useState(9);

        // Precise logic based on Table 1 Equivalence
        let permissibleFAR = 1.3;
        let premiumFAR = 0.2;
        let tdrFAR = 0.1;
        let maxFAR = 1.6;

        if (roadWidth < 6) {
            permissibleFAR = 1.0; premiumFAR = 0.0; tdrFAR = 0.0; maxFAR = 1.0; 
        }
        else if (plotArea <= 1000) { 
            permissibleFAR = 1.3; premiumFAR = 0.2; tdrFAR = 0.1; maxFAR = 1.6; 
        }
        else if (plotArea <= 2000) { 
            permissibleFAR = 1.4; premiumFAR = 0.4; tdrFAR = 0.2; maxFAR = 2.0; 
        }
        else if (plotArea <= 3000) { 
            permissibleFAR = 1.5; premiumFAR = 0.6; tdrFAR = 0.3; maxFAR = 2.4; 
        }
        else if (plotArea <= 4000) { 
            permissibleFAR = 1.6; premiumFAR = 0.8; tdrFAR = 0.4; maxFAR = 2.8; 
        }
        else { 
            // Over 4000 sqm cases depend heavily on road width
            if (roadWidth < 12) {
            permissibleFAR = 1.9; premiumFAR = 1.0; tdrFAR = 0.5; maxFAR = 3.4;
            } else if (roadWidth >= 12 && roadWidth < 18) {
            permissibleFAR = 2.1; premiumFAR = 1.0; tdrFAR = 0.5; maxFAR = 3.6;
            } else if (roadWidth >= 18 && roadWidth < 24) {
            permissibleFAR = 2.3; premiumFAR = 1.0; tdrFAR = 0.5; maxFAR = 3.8;
            } else {
            permissibleFAR = 2.5; premiumFAR = 1.0; tdrFAR = 0.5; maxFAR = 4.0;
            }
        }

        const baseBuiltUp = (plotArea * permissibleFAR).toLocaleString(undefined, { maximumFractionDigits: 2 });
        const maxBuiltUp = (plotArea * maxFAR).toLocaleString(undefined, { maximumFractionDigits: 2 });

        return (

            <p className="text-gray-500 text-sm mb-6">Estimate the Floor Area Ratio and Total Built-up Area based on Table-1 of the Mangalore Zonal Regulations.</p>
            
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="space-y-6">
                <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Plot Area (sq.m)</label>
                    <div className="relative">
                    <input 
                        type="number" 
                        value={plotArea} 
                        onChange={(e) => setPlotArea(Number(e.target.value))}
                        className="w-full p-3 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    />
                    <i className="fas fa-map-marked-alt text-gray-400 absolute left-3 top-4"></i>
                    </div>
                </div>
                <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Proposed Road Width (m)</label>
                    <div className="relative">
                    <select 
                        value={roadWidth} 
                        onChange={(e) => setRoadWidth(Number(e.target.value))}
                        className="w-full p-3 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none bg-white"
                    >
                        <option value={4}>Less than 6m (Restricted FAR)</option>
                        <option value={6}>6m (Approx 20ft)</option>
                        <option value={9}>9m (Approx 30ft)</option>
                        <option value={12}>12m (Approx 40ft)</option>
                        <option value={18}>18m (Approx 60ft)</option>
                        <option value={24}>24m+ (Approx 80ft+)</option>
                    </select>
                    <i className="fas fa-chart-line text-gray-400 absolute left-3 top-4"></i>
                    </div>
                </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-100 flex flex-col justify-center">
                    <span className="block text-sm text-indigo-600 font-semibold mb-1">Base Permissible FAR</span>
                    <span className="text-3xl font-bold text-gray-900 mb-3">{permissibleFAR.toFixed(2)}</span>
                    <div className="pt-3 border-t border-indigo-200">
                    <span className="block text-xs text-indigo-600 font-semibold mb-1">Base Built-up Area</span>
                    <span className="text-xl font-bold text-gray-800">{baseBuiltUp} sq.m</span>
                    </div>
                </div>
                
                <div className="bg-blue-50 p-5 rounded-xl border border-blue-100 flex flex-col justify-center">
                    <span className="block text-sm text-blue-600 font-semibold mb-1">Max Total FAR</span>
                    <span className="text-3xl font-bold text-gray-900 mb-1">{maxFAR.toFixed(2)}</span>
                    <span className="text-xs text-blue-600 mb-2">(incl. Premium {premiumFAR.toFixed(1)} + TDR {tdrFAR.toFixed(1)})</span>
                    <div className="pt-3 border-t border-blue-200">
                    <span className="block text-xs text-blue-600 font-semibold mb-1">Max Built-up Area</span>
                    <span className="text-xl font-bold text-gray-800">{maxBuiltUp} sq.m</span>
                    </div>
                </div>
                </div>
            </div>
            
            {/* Land Use Quick Check based on FAR selections */}
            <div className="mt-6 bg-gray-50 border border-gray-200 rounded-lg p-4 flex items-start space-x-3">
                <i className="fas fa-check-square text-green-600 mt-0.5 text-xl flex-shrink-0"></i>

                    }
                </p>
                </div>
            </div>

            </div>
        );
        };

        const LandUseTableSection = () => {
        return (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mt-8">
            <div className="p-6 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                <div>
                <h3 className="text-xl font-bold flex items-center"><i className="fas fa-layer-group text-2xl mr-2 text-indigo-600"></i> Equivalence Table (Table 1)</h3>

                <i className="fas fa-search text-gray-400 text-2xl"></i>

                    <th className="p-3 border-b font-semibold">Min Road</th>
                    <th className="p-3 border-b font-semibold">Req Road</th>
                    <th className="p-3 border-b font-semibold">FAR Perm.</th>
                    <th className="p-3 border-b font-semibold">FAR Max</th>
                    <th className="p-3 border-b font-semibold">Res Zone</th>
                    <th className="p-3 border-b font-semibold">Com Zone</th>
                    <th className="p-3 border-b font-semibold">Ind Zone</th>
                    <th className="p-3 border-b font-semibold">Inst Zone</th>
                    </tr>
                </thead>
                <tbody className="text-sm">
                    {equivalenceTableData.map((row, idx) => (
                    <tr key={idx} className="hover:bg-indigo-50 border-b border-gray-50 transition-colors">
                        <td className="p-3 font-medium text-gray-900">{row.area}</td>
                        <td className="p-3 text-gray-600">{row.roadMin}</td>
                        <td className="p-3 text-indigo-600 font-medium">{row.roadReq}</td>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 className="text-xl font-bold mb-6 flex items-center"><i className="fas fa-calculator text-2xl mr-2 text-indigo-600"></i> Parking Calculator (Table 8)</h3>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="space-y-6">
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Building Occupancy Type</label>
                        <div className="relative">
                        <select 
                            value={useIdx} 
                            onChange={(e) => setUseIdx(Number(e.target.value))}
                            className="w-full p-3 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none bg-white"
                        >
                            {parkingData.map((data, idx) => (
                            <option key={idx} value={idx}>{data.use}</option>
                            ))}
                        </select>
                        <i className="fas fa-building text-gray-400 absolute left-3 top-4"></i>
                        </div>
                        <div className="mt-3 p-3 bg-gray-50 border border-gray-200 rounded-md">
                        <p className="text-xs text-gray-700 italic flex items-start"><i className="fas fa-info-circle mr-1 flex-shrink-0 mt-0.5"></i> <span>Rule: {selectedUse.rule}</span></p>
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Total Floor Area (sq.m)</label>
                        <div className="relative">
                        <input 
                            type="number" 
                            value={area} 
                            onChange={(e) => setArea(Number(e.target.value))}
                            className="w-full p-3 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        />
                        <i className="fas fa-map-marked-alt text-gray-400 absolute left-3 top-4"></i>
                        </div>
                    </div>
                    </div>

                    <div className="bg-gradient-to-br from-green-50 to-emerald-50 p-6 rounded-xl border border-green-200 flex flex-col justify-center items-center text-center shadow-inner">
                    <div className="bg-white p-4 rounded-full shadow-sm mb-4">
                        <i className="fas fa-car text-4xl text-green-600"></i>
                    </div>
                    <span className="block text-sm text-green-700 font-semibold mb-1 uppercase tracking-wide">Required Car Parking</span>
                    <span className="text-6xl font-extrabold text-gray-900 mb-2 drop-shadow-sm">{reqParks}</span>
                    <span className="text-sm font-medium text-green-600 bg-green-100 px-3 py-1 rounded-full">Spaces Minimum</span>
                    </div>
                </div>
                </div>

                {/* Layout and Dimensions */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-6 border-b border-gray-100">
                        <h3 className="text-xl font-bold flex items-center"><i className="fas fa-road text-2xl mr-2 text-indigo-600"></i> Parking Layouts & Aisle Widths</h3>
                        <p className="text-gray-500 text-sm mt-2">Required driveway aisle widths based on the parking angle orientation.</p>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="bg-gray-100 text-gray-700 text-xs uppercase tracking-wider">
                                <th className="p-4 border-b font-semibold">Parking Type (Angle)</th>
                                <th className="p-4 border-b font-semibold">Standard Bay Size</th>
                                <th className="p-4 border-b font-semibold">Aisle Width (1-Way)</th>
                                <th className="p-4 border-b font-semibold">Aisle Width (2-Way)</th>
                            </tr>
                        </thead>
                        <tbody>
                            {parkingLayoutData.map((row, idx) => (
                            <tr key={idx} className="hover:bg-indigo-50 border-b border-gray-50 text-sm transition-colors">
                                <td className="p-4 font-bold text-gray-900">{row.angle}</td>
                                <td className="p-4 text-gray-600 font-medium">{row.baySize}</td>
                                <td className="p-4 text-gray-800 font-semibold">{row.aisleOneWay}</td>
                                <td className="p-4 text-gray-800 font-semibold">{row.aisleTwoWay}</td>
                            </tr>
                            ))}
                        </tbody>
                        </table>
                    </div>
                </div>

                {/* Turning Radius & General Standards */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="text-xl font-bold mb-6 flex items-center"><i className="fas fa-sync-alt text-2xl mr-2 text-indigo-600"></i> Minimum Turning Radius</h3>
                        <div className="space-y-4">
                            {turningRadiusData.map((item, idx) => (
                                <div key={idx} className="bg-indigo-50 p-4 rounded-lg border border-indigo-100 flex items-start space-x-4">
                                    <div className="bg-white p-2 rounded-full shadow-sm text-indigo-500 mt-1">
                                        <i className={`fas ${item.vehicle.includes('Car') ? 'fa-car-side' : item.vehicle.includes('Fire') ? 'fa-fire-extinguisher' : 'fa-bus'} w-5 h-5 flex items-center justify-center`}></i>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-gray-900">{item.vehicle}</h4>
                                        <p className="text-2xl font-black text-indigo-600 my-1">{item.radius}</p>
                                        <p className="text-xs text-gray-600">{item.description}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h4 className="text-xl font-bold mb-6 text-gray-900 flex items-center"><i className="fas fa-list-ul text-2xl mr-2 text-indigo-600"></i> General Standards</h4>
                        <ul className="list-none space-y-4 text-sm text-gray-700">
                            <li className="flex items-start bg-gray-50 p-3 rounded-md border border-gray-100">
                                <i className="fas fa-motorcycle text-indigo-500 mt-1 mr-3 flex-shrink-0 text-lg"></i> 
                                <div><strong>Two-Wheelers:</strong> Scooter parking space must be at least 2.0 sq.m (2.0m x 1.0m) and should be an additional 25% of the required car parks.</div>
                            </li>
                            <li className="flex items-start bg-gray-50 p-3 rounded-md border border-gray-100">
                                <i className="fas fa-users text-indigo-500 mt-1 mr-3 flex-shrink-0 text-lg"></i> 
                                <div><strong>Visitor Parking:</strong> In multistoried residential apartments, an additional 10% of the required car parking must be provided exclusively for visitors.</div>
                            </li>
                            <li className="flex items-start bg-gray-50 p-3 rounded-md border border-gray-100">
                                <i className="fas fa-layer-group text-indigo-500 mt-1 mr-3 flex-shrink-0 text-lg"></i> 
                                <div><strong>Stilt Parking:</strong> Parking provided on a stilt floor (all sides open) is exempted from FAR calculations. Minimum stilt height is generally 2.4m.</div>
                            </li>
                            <li className="flex items-start bg-gray-50 p-3 rounded-md border border-gray-100">
                                <i className="fas fa-ban text-indigo-500 mt-1 mr-3 flex-shrink-0 text-lg"></i> 
                                <div><strong>Exemptions:</strong> No parking space shall be insisted upon in intensively built-up areas up to 100 sq.m of total floor area.</div>
                            </li>
                        </ul>
                    </div>
                </div>

            </div>
        );
        };


        // --- MAIN APP ---

        function App() {
        const [activeTab, setActiveTab] = useState('zones');

        return (
            <div className="min-h-screen font-sans text-gray-800">
            {/* Header */}
            <header className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex flex-col md:flex-row md:items-center md:justify-between py-4">
                    <div className="flex items-center space-x-3">
                    <div className="bg-gradient-to-br from-indigo-600 to-blue-700 p-2.5 rounded-xl shadow-sm">
                        <i className="fas fa-map-marked-alt text-2xl text-white"></i>
                    </div>
                    <div>
                        <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight">Mangalore Zonal Regulations</h1>
                        <p className="text-xs text-indigo-600 font-bold tracking-wider uppercase">2011 Gazette Notification Explorer</p>
                    </div>
                    </div>
                </div>
                
                {/* Navigation Tabs */}
                <div className="flex space-x-2 overflow-x-auto mt-2 hide-scrollbar pb-1">
                    <TabButton 
                    active={activeTab === 'zones'} 
                    onClick={() => setActiveTab('zones')}
                    icon={<i className="fas fa-book-open"></i>} 
                    label="Land Use Zones" 
                    />
                    <TabButton 
                    active={activeTab === 'metrics'} 
                    onClick={() => setActiveTab('metrics')}
                    icon={<i className="fas fa-calculator"></i>} 
                    label="FAR & Metrics" 
                    />
                    <TabButton 
                    active={activeTab === 'setbacks'} 
                    onClick={() => setActiveTab('setbacks')}
                    icon={<i className="fas fa-ruler-combined"></i>} 
                    label="Setbacks & Heights" 
                    />
                    <TabButton 
                    active={activeTab === 'standards'} 
                    onClick={() => setActiveTab('standards')}
                    icon={<i className="fas fa-shield-alt"></i>} 
                    label="Codes & Safety" 
                    />
                    <TabButton 
                    active={activeTab === 'facilities'} 
                    onClick={() => setActiveTab('facilities')}
                    icon={<i className="fas fa-users"></i>} 
                    label="Occupancy & Lifts" 
                    />
                    <TabButton 
                    active={activeTab === 'specs'} 
                    onClick={() => setActiveTab('specs')}
                    icon={<i className="fas fa-expand-arrows-alt"></i>} 
                    label="Room Specs & Egress" 
                    />
                    <TabButton 
                    active={activeTab === 'parking'} 
                    onClick={() => setActiveTab('parking')}
                    icon={<i className="fas fa-car"></i>} 
                    label="Parking Rules" 
                    />
                </div>
                </div>
            </header>

            {/* Main Content */}
            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                
                {/* Intro Alert */}
                <div className="bg-blue-50 border border-blue-200 text-blue-800 px-5 py-4 rounded-xl mb-8 flex items-start space-x-3 shadow-sm">
                <i className="fas fa-info-circle text-2xl flex-shrink-0 mt-0.5 text-blue-600"></i>
                <div className="text-sm leading-relaxed">
                    <strong className="block mb-1 text-base">Interactive Guide Disclaimer</strong> 
                    This interactive guide is a simplified representation of the <em>Final Zonal Regulations of Mangalore Local Planning Area (Notified Oct 26, 2011)</em>. It is designed to make the core concepts (Residential, Commercial, Industrial, Institutional, Educational, Assembly) easier to understand. For legal construction purposes, always refer to the official MUDA (Mangalore Urban Development Authority) documentation.
                </div>
                </div>

                {/* Tab Content: Zones */}
                {activeTab === 'zones' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Permissible Land Use Categories</h2>
                    <p className="text-gray-600 text-lg">Explore what types of buildings and activities are allowed in different city zones.</p>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {categoriesData.map(data => (
                        <CategoryCard key={data.id} data={data} />
                    ))}
                    </div>
                </div>
                )}

                {/* Tab Content: Metrics / FAR */}
                {activeTab === 'metrics' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Floor Area Ratio (FAR)</h2>
                    <p className="text-gray-600 text-lg">FAR dictates how much total floor area you can build relative to your plot size. It is heavily dependent on the width of the road facing your property.</p>
                    </div>
                    
                    <CalculatorSection />
                    <LandUseTableSection />
                    
                    <div className="mt-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h4 className="font-bold mb-4 text-lg">Important Rules regarding FAR:</h4>
                    <ul className="list-disc pl-5 space-y-3 text-sm text-gray-700">
                        <li><strong>Road Widths:</strong> The FAR is determined by a combination of existing and proposed road widths. If the existing road width falls between two categories, the lower one is considered.</li>
                        <li><strong>Premium FAR:</strong> You can purchase Premium FAR. The value is calculated on permissible floor area at 50% of the land cost (Guidance Value).</li>
                        <li><strong>Exemptions:</strong> Areas excluded from FAR computation include Staircases, Lifts, Parking areas, Swiming pools (open to sky), Overhead tanks, and Watchman cubicles (&lt;3sqm).</li>
                        <li><strong>Amalgamation:</strong> Clubbing 2 or more properties together yields an additional permissible FAR bonus ranging from +0.3 to +0.5 depending on total area and road width.</li>
                    </ul>
                    </div>
                </div>
                )}

                {/* Tab Content: Setbacks */}
                {activeTab === 'setbacks' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Building Setbacks & Coverage</h2>
                    <p className="text-gray-600 text-lg">Setbacks protect residential/commercial areas by ensuring adequate light, air, and protection from fire. They increase as the height of the building increases.</p>
                    </div>
                    
                    <SetbackSection />
                </div>
                )}

                {/* Tab Content: Standards (Replaced Circulation) */}
                {activeTab === 'standards' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Building Codes, Safety & Standards</h2>
                    <p className="text-gray-600 text-lg">Comprehensive regulations covering Fire Safety, Eco Guidelines, and Circulation widths.</p>
                    </div>
                    
                    <StandardsSection />
                </div>
                )}

                {/* Tab Content: Facilities & Occupancy */}
                {activeTab === 'facilities' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Occupancy, Lifts & Accessibility</h2>
                    <p className="text-gray-600 text-lg">Calculate Peak Occupancy, required toilet units, and view regulations for Elevators and Ramps.</p>
                    </div>
                    
                    <FacilitiesSection />
                </div>
                )}

                {/* Tab Content: Building Specs */}
                {activeTab === 'specs' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Room Dimensions & Egress</h2>
                    <p className="text-gray-600 text-lg">Minimum room sizes, natural light requirements, ventilation standards, and means of escape.</p>
                    </div>
                    
                    <BuildingSpecsSection />
                </div>
                )}

                {/* Tab Content: Parking */}
                {activeTab === 'parking' && (
                <div className="space-y-6 animate-fadeIn">
                    <div className="mb-8 border-b border-gray-200 pb-4">
                    <h2 className="text-3xl font-extrabold text-gray-900 mb-2">Off-Street Parking Requirements</h2>
                    <p className="text-gray-600 text-lg">Calculate the minimum number of parking bays required based on the occupancy type and floor area.</p>
                    </div>
                    
                    <ParkingSection />
                    
                </div>
                )}

            </main>
            
            {/* Footer */}
            <footer className="bg-white border-t border-gray-200 mt-12 py-6 shadow-inner">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                    <p className="text-sm text-gray-500">
                        Created and designed by <span className="font-bold text-indigo-600">Ar. Jacob Thomas</span>
                    </p>
                </div>
            </footer>
            </div>
        );
        }

        // --- RENDER APP TO DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
